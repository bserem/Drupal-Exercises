id: migrate_swapi_people
label: 'Migrate SWAPI People'
migration_group: migrate_swapi
source:
  plugin: url
  data_fetcher_plugin: http
  data_parser_plugin: json
  urls:
    - 'https://swapi.dev/api/people/'
  item_selector: '/results'
  fields:
    - name: 'name'
      label: 'Name'
    - name: 'height'
      label: 'Height'
    - name: 'mass'
      label: 'Mass'
    - name: 'hair_color'
      label: 'Hair_color'
    - name: 'skin_color'
      label: 'skin_color'
    - name: 'eye_color'
      label: 'Eye_color'
    - name: 'gender'
      label: 'Gender'
  ids:
    - name
process:
  field_name: name
  field_height: height
  field_mass: mass
  field_hair_color: hair_color
  field_skin_color: skin_color
  field_eye_color: eye_color
  field_gender: gender
destination:
  plugin: 'entity:node'
  default_bundle: 'person'
dependencies: []